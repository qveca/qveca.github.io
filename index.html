<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>?→</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f8f8f6;
      width: 100vw; height: 100vh;
      overflow: hidden;
    }
    .stage {
      position: relative;
      width: 100vw; height: 100vh;
    }
    /* 波紋canvas：最下層 */
    #ripple-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #ripple-canvas.visible { opacity: 1; }

    /* ベクトルSVG */
    #vector-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #vector-overlay.visible { opacity: 1; }

    /* image1：最上位 */
    #node-center {
      position: absolute;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
      transition: width 0.7s ease, height 0.7s ease, left 0.7s ease, top 0.7s ease;
    }
    #node-center img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* trinity nodes */
    .trinity-node {
      position: absolute;
      border-radius: 50%;
      overflow: visible;
      cursor: pointer;
      z-index: 6;
      opacity: 0;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.6s ease;
    }
    .trinity-node img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      pointer-events: none;
      filter: blur(0px);
    }
    .trinity-node.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
<div class="stage">
  <canvas id="ripple-canvas"></canvas>

  <svg id="vector-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow-end" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="rgba(100,100,100,0.3)"/>
      </marker>
      <marker id="arrow-start" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
        <path d="M0,0 L0,6 L8,3 z" fill="rgba(100,100,100,0.3)"/>
      </marker>
    </defs>
  </svg>

  <div id="node-center" onclick="expandTrinity()">
    <img src="image1-qveca.png" alt="?→">
  </div>

  <div class="trinity-node" id="node-2" onclick="handleTrinityClick(2, 'https://www.threads.com/@yasuto_okamura')">
    <img src="image2-inside.png" alt="内向きの?→">
  </div>
  <div class="trinity-node" id="node-3" onclick="handleTrinityClick(3, 'https://www.instagram.com/yasuto_okamura')">
    <img src="image3-outside.png" alt="外向きの?→">
  </div>
  <div class="trinity-node" id="node-4" onclick="handleTrinityClick(4, null)">
    <img src="image4-infinity.png" alt="世界・宇宙・全て">
  </div>
</div>

<script>
  let trinityVisible = false;
  let rotationAngle = 0;
  let wobbleT = 0;
  const clickCount = { 2: 0, 3: 0, 4: 0 };
  const baseAngles = [270, 30, 150];
  const nodeIds = ['node-2', 'node-3', 'node-4'];

  // 各imageの代表色（RGBA）
  const nodeColors = [
    { r: 80,  g: 80,  b: 80,  a: 0.18 }, // image2: モノクロ→グレー
    { r: 220, g: 120, b: 60,  a: 0.18 }, // image3: 暖色オレンジ
    { r: 60,  g: 130, b: 180, a: 0.18 }, // image4: 青緑
  ];

  const wobble = [
    { phase: 0,   speed: 0.012, amp: 6 },
    { phase: 2.1, speed: 0.009, amp: 8 },
    { phase: 4.3, speed: 0.011, amp: 5 },
  ];

  // image1の揺らぎ（pulse代替）
  let pulseT = 0;

  function vmin() { return Math.min(window.innerWidth, window.innerHeight); }
  function centerX() { return window.innerWidth / 2; }
  function centerY() { return window.innerHeight / 2; }
  function nodeSize() { return vmin() * 0.22; }
  function orbitRadius() { return vmin() * 0.34; }

  function setNodeCenter(expanded) {
    const el = document.getElementById('node-center');
    const size = expanded ? vmin() * 0.28 : vmin() * 0.78;
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.left   = (centerX() - size / 2) + 'px';
    el.style.top    = (centerY() - size / 2) + 'px';
  }

  function edgePoint(from, to, r) {
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const margin = 7;
    return {
      x: from.x + (dx / len) * (r + margin),
      y: from.y + (dy / len) * (r + margin),
    };
  }

  function makeArcPath(from, to, cp) {
    const s = edgePoint(from, to, from.r);
    const e = edgePoint(to, from, to.r);
    return `M ${s.x} ${s.y} Q ${cp.x} ${cp.y} ${e.x} ${e.y}`;
  }

  function drawVectors(cx, cy, positions) {
    const svg = document.getElementById('vector-overlay');
    const defs = svg.querySelector('defs');
    svg.innerHTML = '';
    svg.appendChild(defs);

    const c1size = parseFloat(document.getElementById('node-center').style.width);
    const center = { x: cx, y: cy, r: c1size / 2 };

    // Trinity間ベクトル（三角形の辺・弧）
    for (let i = 0; i < positions.length; i++) {
      const from = positions[i];
      const to   = positions[(i + 1) % positions.length];
      const mx   = (from.x + to.x) / 2;
      const my   = (from.y + to.y) / 2;
      const cp   = {
        x: mx + (cx - mx) * 0.18,
        y: my + (cy - my) * 0.18,
      };
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', makeArcPath(from, to, cp));
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'rgba(100,100,100,0.22)');
      path.setAttribute('stroke-width', '1');
      path.setAttribute('marker-start', 'url(#arrow-start)');
      path.setAttribute('marker-end', 'url(#arrow-end)');
      svg.appendChild(path);
    }

    // 中心 ↔ 各Trinity（ほぼ直線：制御点を中点に置く）
    positions.forEach(pos => {
      const cp = {
        x: (cx + pos.x) / 2,
        y: (cy + pos.y) / 2,
      };
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', makeArcPath(center, pos, cp));
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'rgba(100,100,100,0.18)');
      path.setAttribute('stroke-width', '0.8');
      path.setAttribute('marker-start', 'url(#arrow-start)');
      path.setAttribute('marker-end', 'url(#arrow-end)');
      svg.appendChild(path);
    });
  }

  // --- 波紋エフェクト ---
  const canvas  = document.getElementById('ripple-canvas');
  const ctx     = canvas.getContext('2d');
  let ripples   = [];
  let rippleAnim;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function spawnRipple(x, y, color) {
    ripples.push({ x, y, r: 0, maxR: Math.max(window.innerWidth, window.innerHeight) * 1.2, color, life: 1 });
  }

  function drawRipples() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ripples = ripples.filter(rp => rp.life > 0);

    ripples.forEach(rp => {
      rp.r    += 1.2;
      rp.life  = 1 - rp.r / rp.maxR;

      const grad = ctx.createRadialGradient(rp.x, rp.y, rp.r * 0.6, rp.x, rp.y, rp.r);
      grad.addColorStop(0,   `rgba(${rp.color.r},${rp.color.g},${rp.color.b},0)`);
      grad.addColorStop(0.7, `rgba(${rp.color.r},${rp.color.g},${rp.color.b},${rp.color.a * rp.life * 0.6})`);
      grad.addColorStop(1,   `rgba(${rp.color.r},${rp.color.g},${rp.color.b},0)`);

      ctx.beginPath();
      ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    });

    rippleAnim = requestAnimationFrame(drawRipples);
  }

  let rippleInterval;
  function startRipples(positions) {
    resizeCanvas();
    document.getElementById('ripple-canvas').classList.add('visible');
    drawRipples();

    // 各Trinity nodeから定期的に波紋を発生
    rippleInterval = setInterval(() => {
      positions.forEach((pos, i) => {
        spawnRipple(pos.x, pos.y, nodeColors[i]);
      });
    }, 1800);

    // image1からも波紋（グレー）
    setInterval(() => {
      spawnRipple(centerX(), centerY(), { r: 140, g: 140, b: 140, a: 0.12 });
    }, 2400);
  }

  // --- Trinity更新 ---
  function updateTrinityPositions() {
    wobbleT++;
    const r    = orbitRadius();
    const size = nodeSize();
    const cx   = centerX();
    const cy   = centerY();
    const positions = [];

    nodeIds.forEach((id, i) => {
      const node = document.getElementById(id);
      const deg  = (baseAngles[i] + rotationAngle) * Math.PI / 180;
      const wx   = Math.sin(wobbleT * wobble[i].speed + wobble[i].phase) * wobble[i].amp;
      const wy   = Math.cos(wobbleT * wobble[i].speed * 1.3 + wobble[i].phase) * wobble[i].amp * 0.6;
      const x    = cx + r * Math.cos(deg) + wx;
      const y    = cy + r * Math.sin(deg) + wy;
      node.style.width  = size + 'px';
      node.style.height = size + 'px';
      node.style.left   = (x - size / 2) + 'px';
      node.style.top    = (y - size / 2) + 'px';
      positions.push({ x, y, r: size / 2 });
    });

    drawVectors(cx, cy, positions);
    return positions;
  }

  let latestPositions = [];
  function animate() {
    rotationAngle += 0.12;
    latestPositions = updateTrinityPositions();
    requestAnimationFrame(animate);
  }

  function expandTrinity() {
    if (trinityVisible) {
      window.open('https://x.com/eple61', '_blank');
      return;
    }
    trinityVisible = true;
    setNodeCenter(true);

    updateTrinityPositions();
    nodeIds.forEach((id, i) => {
      setTimeout(() => {
        document.getElementById(id).classList.add('visible');
      }, i * 180);
    });
    setTimeout(() => {
      document.getElementById('vector-overlay').classList.add('visible');
      startRipples(latestPositions);
    }, 600);

    animate();
  }

  function handleTrinityClick(id, url) {
    clickCount[id]++;
    if (id === 2) {
      window.open(url, '_blank'); clickCount[id] = 0;
    } else if (id === 3) {
      if (clickCount[id] >= 2) { window.open(url, '_blank'); clickCount[id] = 0; }
    } else if (id === 4) {
      window.open('https://ja.wikipedia.org/wiki/Special:RandomPage', '_blank'); clickCount[id] = 0;
    }
  }

  resizeCanvas();
  setNodeCenter(false);
  window.addEventListener('resize', () => {
    resizeCanvas();
    setNodeCenter(trinityVisible);
    if (trinityVisible) updateTrinityPositions();
  });
</script>
</body>
</html>
