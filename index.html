<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>?→</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f8f8f6;
      width: 100vw; height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .stage { position: relative; width: 100vw; height: 100vh; }

    #ripple-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1; opacity: 0;
      transition: opacity 1.2s ease;
    }
    #ripple-canvas.visible { opacity: 1; }

    #vector-overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3; opacity: 0;
      transition: opacity 0.8s ease;
    }
    #vector-overlay.visible { opacity: 1; }

    .node {
      position: absolute;
      border-radius: 50%;
      overflow: visible;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    /* 画像をCSSバックグラウンドとして描画（右クリック保存防止） */
    .node-bg {
      width: 100%; height: 100%;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 38%, rgba(0,0,0,0.5) 62%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(circle, rgba(0,0,0,1) 38%, rgba(0,0,0,0.5) 62%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      -webkit-user-drag: none;
    }
    #node-center { z-index: 10; }
    .satellite { z-index: 6; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; }
    .satellite.visible { opacity: 1; pointer-events: auto; }

    /* フェーズ3：中心の空スペース */
    #node-center.empty {
      pointer-events: none;
      opacity: 0;
    }
  </style>
</head>
<body>
<div class="stage">
  <canvas id="ripple-canvas"></canvas>
  <svg id="vector-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow-end" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L7,3 z" fill="rgba(100,100,100,0.35)"/>
      </marker>
      <marker id="arrow-start" markerWidth="7" markerHeight="7" refX="2" refY="3" orient="auto-start-reverse">
        <path d="M0,0 L0,6 L7,3 z" fill="rgba(100,100,100,0.35)"/>
      </marker>
    </defs>
  </svg>
  <div class="node" id="node-center"><div class="node-bg" id="bg-center"></div></div>
  <div class="node satellite" id="node-2"><div class="node-bg" id="bg-2"></div></div>
  <div class="node satellite" id="node-3"><div class="node-bg" id="bg-3"></div></div>
  <div class="node satellite" id="node-4"><div class="node-bg" id="bg-4"></div></div>
  <div class="node satellite" id="node-5"><div class="node-bg" id="bg-5"></div></div>
  <div class="node satellite" id="node-6"><div class="node-bg" id="bg-6"></div></div>
</div>

<script>
  // セキュリティ：右クリック・長押し・ドラッグ禁止
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart',   e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  // iOS長押し禁止
  document.addEventListener('touchstart', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  let longPressTimer;
  document.addEventListener('touchstart', () => {
    longPressTimer = setTimeout(() => {}, 600);
  });
  document.addEventListener('touchend', () => clearTimeout(longPressTimer));

  // =========================================================
  // ノードデータ
  // =========================================================
  const NODE_DATA = {
    'node-center': {
      img: 'image1-qveca.png',
      url: 'https://x.com/qveca_space',
      color: { r: 140, g: 140, b: 140, a: 0.15 },
      // フェーズ2の子（2,3,4のみ）
      children: ['node-2', 'node-3', 'node-4'],
      // フェーズ3の内周パートナー
      projectPartner: 'node-5',
    },
    'node-2': {
      img: 'image2-inside.png',
      url: 'https://www.threads.com/@yasuto_okamura',
      color: { r: 80, g: 80, b: 80, a: 0.15 },
      children: [],
    },
    'node-3': {
      img: 'image3-outside.png',
      url: 'https://www.instagram.com/yasuto_okamura',
      color: { r: 220, g: 120, b: 60, a: 0.15 },
      children: [],
    },
    'node-4': {
      img: 'image4-infinity.png',
      url: 'https://ja.wikipedia.org/wiki/Special:RandomPage',
      color: { r: 60, g: 130, b: 180, a: 0.15 },
      children: [],
    },
    'node-5': {
      img: 'image5-observation.png',
      url: 'observation.html',
      color: { r: 160, g: 100, b: 200, a: 0.15 },
      children: [],
    },
    'node-6': {
      img: 'image6-commons.png',
      url: 'commons.html',
      color: { r: 80, g: 140, b: 100, a: 0.15 },
      children: [],
    },
  };

  // 全node IDリスト
  const ALL_NODE_IDS = ['node-center','node-2','node-3','node-4','node-5','node-6'];

  // =========================================================
  // 状態
  // =========================================================
  // phase: 'init' | 'expanded' | 'project'
  let state = {
    phase: 'init',
    centerNodeId: 'node-center',
    satelliteNodeIds: [],    // フェーズ2：[2,3,4]
    innerNodeIds: [],        // フェーズ3内周：[center,5]
    outerNodeIds: [],        // フェーズ3外周：[2,3,4]
    centerClickCount: 0,     // image1のクリック回数
    rotationAngle: 0,
    innerRotationAngle: 0,
    wobbleT: 0,
    latestPositions: {},
    rippleTimers: [],
  };
  const wobbleParams = {};

  // =========================================================
  // レイアウト
  // =========================================================
  function vmin()         { return Math.min(window.innerWidth, window.innerHeight); }
  function cx()           { return window.innerWidth  / 2; }
  function cy()           { return window.innerHeight / 2; }
  function centerSize(expanded) { return vmin() * (expanded ? 0.28 : 0.78); }
  function satelliteSize()      { return vmin() * 0.22; }
  function orbitRadius()        { return vmin() * 0.34; }
  function innerOrbitRadius()   { return vmin() * 0.18; }  // 内周（image1+5）

  function setNodeStyle(el, x, y, size) {
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.left   = (x - size / 2) + 'px';
    el.style.top    = (y - size / 2) + 'px';
  }

  function setNodeBg(id, imgSrc) {
    const bg = document.getElementById('bg-' + id.replace('node-',''));
    if (bg) bg.style.backgroundImage = `url('${imgSrc}')`;
  }

  function initWobble(id, index) {
    if (!wobbleParams[id]) {
      wobbleParams[id] = {
        phase: (index * 2.1) % (Math.PI * 2),
        speed: 0.009 + (index % 3) * 0.003,
        amp:   5 + (index % 3) * 3,
      };
    }
  }

  function baseAnglesFor(n) {
    return Array.from({ length: n }, (_, i) => (i * 360 / n) - 90);
  }

  // =========================================================
  // ベクトル描画
  // =========================================================
  function drawVectors(centerPos, satPositions) {
    const svg  = document.getElementById('vector-overlay');
    const defs = svg.querySelector('defs');
    svg.innerHTML = '';
    svg.appendChild(defs);

    const SAT_MASK    = 0.78;
    const CENTER_MASK = 0.72;

    function edgePt(from, to, r, isCenter) {
      const dx = to.x - from.x, dy = to.y - from.y;
      const len = Math.sqrt(dx*dx + dy*dy) || 1;
      const ratio = isCenter ? CENTER_MASK : SAT_MASK;
      return { x: from.x + (dx/len)*(r*ratio), y: from.y + (dy/len)*(r*ratio) };
    }

    function addPath(from, to, curved, fromIsCenter, toIsCenter) {
      const s  = edgePt(from, to, from.r, fromIsCenter);
      const e  = edgePt(to, from, to.r,   toIsCenter);
      const mx = (s.x+e.x)/2, my = (s.y+e.y)/2;
      const cp = curved
        ? { x: mx+(centerPos.x-mx)*0.15, y: my+(centerPos.y-my)*0.15 }
        : { x: mx, y: my };
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M ${s.x} ${s.y} Q ${cp.x} ${cp.y} ${e.x} ${e.y}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke', curved ? 'rgba(100,100,100,0.22)' : 'rgba(100,100,100,0.18)');
      path.setAttribute('stroke-width','1');
      path.setAttribute('marker-start','url(#arrow-start)');
      path.setAttribute('marker-end',  'url(#arrow-end)');
      svg.appendChild(path);
    }

    if (centerPos) {
      for (let i=0; i<satPositions.length; i++) {
        addPath(satPositions[i], satPositions[(i+1)%satPositions.length], true, false, false);
      }
      satPositions.forEach(pos => addPath(centerPos, pos, false, true, false));
    } else {
      // フェーズ3：centerなし。inner同士 + outer同士 + inner-outer間
      // innerPositions, outerPositions は satPositions[0..1], [2..4]
    }
  }

  function drawVectorsProject(innerPositions, outerPositions) {
    const svg  = document.getElementById('vector-overlay');
    const defs = svg.querySelector('defs');
    svg.innerHTML = '';
    svg.appendChild(defs);

    const MASK = 0.78;
    function edgePt(from, to, r) {
      const dx = to.x-from.x, dy = to.y-from.y;
      const len = Math.sqrt(dx*dx+dy*dy)||1;
      return { x: from.x+(dx/len)*(r*MASK), y: from.y+(dy/len)*(r*MASK) };
    }
    function addPath(from, to, opacity) {
      const s = edgePt(from, to, from.r);
      const e = edgePt(to, from, to.r);
      const mx=(s.x+e.x)/2, my=(s.y+e.y)/2;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M ${s.x} ${s.y} Q ${mx} ${my} ${e.x} ${e.y}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke',`rgba(100,100,100,${opacity})`);
      path.setAttribute('stroke-width','1');
      path.setAttribute('marker-start','url(#arrow-start)');
      path.setAttribute('marker-end','url(#arrow-end)');
      svg.appendChild(path);
    }

    // inner同士
    if (innerPositions.length===2) addPath(innerPositions[0], innerPositions[1], 0.25);
    // outer Trinity
    for (let i=0; i<outerPositions.length; i++) {
      addPath(outerPositions[i], outerPositions[(i+1)%outerPositions.length], 0.2);
    }
    // inner-outer間：共鳴ベクトル
    innerPositions.forEach(ip => {
      outerPositions.forEach(op => addPath(ip, op, 0.1));
    });
  }

  // =========================================================
  // 波紋
  // =========================================================
  const canvas = document.getElementById('ripple-canvas');
  const ctx    = canvas.getContext('2d');
  let ripples  = [];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function spawnRipple(nodeId) {
    const pos   = state.latestPositions[nodeId];
    const color = NODE_DATA[nodeId]?.color;
    if (!pos || !color) return;
    ripples.push({ x:pos.x, y:pos.y, r:0,
      maxR: Math.max(window.innerWidth, window.innerHeight)*1.4,
      color, life:1 });
  }

  function drawRipples() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ripples = ripples.filter(rp => rp.life > 0.01);
    ripples.forEach(rp => {
      rp.r   += 1.0;
      rp.life = 1 - rp.r/rp.maxR;
      const a = rp.color.a * rp.life;
      const g = ctx.createRadialGradient(rp.x,rp.y,0,rp.x,rp.y,rp.r);
      g.addColorStop(0,    `rgba(${rp.color.r},${rp.color.g},${rp.color.b},${a})`);
      g.addColorStop(0.35, `rgba(${rp.color.r},${rp.color.g},${rp.color.b},${a*0.5})`);
      g.addColorStop(1,    `rgba(${rp.color.r},${rp.color.g},${rp.color.b},0)`);
      ctx.beginPath();
      ctx.arc(rp.x,rp.y,rp.r,0,Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
    });
    requestAnimationFrame(drawRipples);
  }

  function scheduleRipple(nodeId) {
    spawnRipple(nodeId);
    function loop() {
      const delay = 2500 + Math.random()*4000;
      const t = setTimeout(() => { spawnRipple(nodeId); loop(); }, delay);
      state.rippleTimers.push(t);
    }
    loop();
  }

  function startRipples(nodeIds) {
    state.rippleTimers.forEach(t => clearTimeout(t));
    state.rippleTimers = [];
    canvas.classList.add('visible');
    nodeIds.forEach((id,i) => setTimeout(() => scheduleRipple(id), i*500));
  }

  // =========================================================
  // アニメーションループ
  // =========================================================
  function animLoop() {
    requestAnimationFrame(animLoop);
    if (state.phase==='init') return;

    state.rotationAngle      += 0.12;
    state.innerRotationAngle += 0.18;   // 内周はやや速く
    state.wobbleT++;

    const pcx = cx(), pcy = cy();

    if (state.phase==='expanded') {
      // ── フェーズ2：中心＋Trinity ──
      const centerId = state.centerNodeId;
      const satIds   = state.satelliteNodeIds;
      const n        = satIds.length;
      const angles   = baseAnglesFor(n);
      const r        = orbitRadius();
      const cSize    = centerSize(true);
      const sSize    = satelliteSize();

      const cwx = Math.sin(state.wobbleT*0.007)*3;
      const cwy = Math.cos(state.wobbleT*0.005)*2;
      const cEl = document.getElementById(centerId);
      setNodeStyle(cEl, pcx+cwx, pcy+cwy, cSize);
      const centerPos = { x:pcx+cwx, y:pcy+cwy, r:cSize/2 };
      state.latestPositions[centerId] = centerPos;

      const satPositions = satIds.map((id,i) => {
        initWobble(id,i);
        const wp  = wobbleParams[id];
        const deg = (angles[i]+state.rotationAngle)*Math.PI/180;
        const wx  = Math.sin(state.wobbleT*wp.speed+wp.phase)*wp.amp;
        const wy  = Math.cos(state.wobbleT*wp.speed*1.3+wp.phase)*wp.amp*0.6;
        const x   = pcx+r*Math.cos(deg)+wx;
        const y   = pcy+r*Math.sin(deg)+wy;
        const el  = document.getElementById(id);
        if (el) setNodeStyle(el,x,y,sSize);
        const pos = { x,y,r:sSize/2 };
        state.latestPositions[id] = pos;
        return pos;
      });

      drawVectors(centerPos, satPositions);

    } else if (state.phase==='project') {
      // ── フェーズ3：内周（image1+5）＋外周Trinity ──
      const innerIds  = state.innerNodeIds;
      const outerIds  = state.outerNodeIds;
      const innerR    = innerOrbitRadius();
      const outerR    = orbitRadius();
      const sSize     = satelliteSize();
      const innerAngles = baseAnglesFor(innerIds.length);
      const outerAngles = baseAnglesFor(outerIds.length);

      // 内周
      const innerPositions = innerIds.map((id,i) => {
        initWobble(id, i+10);
        const wp  = wobbleParams[id];
        const deg = (innerAngles[i]+state.innerRotationAngle)*Math.PI/180;
        const wx  = Math.sin(state.wobbleT*wp.speed+wp.phase)*wp.amp*0.5;
        const wy  = Math.cos(state.wobbleT*wp.speed*1.3+wp.phase)*wp.amp*0.4;
        const x   = pcx+innerR*Math.cos(deg)+wx;
        const y   = pcy+innerR*Math.sin(deg)+wy;
        const el  = document.getElementById(id);
        if (el) setNodeStyle(el,x,y,sSize);
        const pos = { x,y,r:sSize/2 };
        state.latestPositions[id] = pos;
        return pos;
      });

      // 外周
      const outerPositions = outerIds.map((id,i) => {
        initWobble(id,i);
        const wp  = wobbleParams[id];
        const deg = (outerAngles[i]+state.rotationAngle)*Math.PI/180;
        const wx  = Math.sin(state.wobbleT*wp.speed+wp.phase)*wp.amp;
        const wy  = Math.cos(state.wobbleT*wp.speed*1.3+wp.phase)*wp.amp*0.6;
        const x   = pcx+outerR*Math.cos(deg)+wx;
        const y   = pcy+outerR*Math.sin(deg)+wy;
        const el  = document.getElementById(id);
        if (el) setNodeStyle(el,x,y,sSize);
        const pos = { x,y,r:sSize/2 };
        state.latestPositions[id] = pos;
        return pos;
      });

      drawVectorsProject(innerPositions, outerPositions);
    }
  }

  // =========================================================
  // クリックハンドラ
  // =========================================================
  function bindClicks() {
    ALL_NODE_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.onclick = () => onNodeClick(id);
    });
  }

  function onNodeClick(id) {
    if (state.phase==='init') {
      // 初回：image1クリック → フェーズ2
      if (id==='node-center') enterPhase2();
      return;
    }

    if (state.phase==='expanded') {
      if (id===state.centerNodeId) {
        // image1の2回目クリック → フェーズ3
        state.centerClickCount++;
        if (state.centerClickCount>=1) enterPhase3();
      } else {
        // satellite：2クリックでURL遷移
        const data = NODE_DATA[id];
        if (!data) return;
        if (!state._satClicks) state._satClicks = {};
        state._satClicks[id] = (state._satClicks[id]||0) + 1;
        if (state._satClicks[id]>=2) {
          const url = data.url;
          if (url) {
            if (url.startsWith('http')) window.open(url,'_blank');
            else window.location.href = url;
          }
          state._satClicks[id] = 0;
        }
      }
      return;
    }

    if (state.phase==='project') {
      // image1：3回目クリック（フェーズ3内でのクリック）→ X遷移
      if (id==='node-center') {
        window.open(NODE_DATA['node-center'].url, '_blank');
        return;
      }
      // その他satellite
      const data = NODE_DATA[id];
      if (!data) return;
      if (!state._satClicks) state._satClicks = {};
      state._satClicks[id] = (state._satClicks[id]||0) + 1;
      if (state._satClicks[id]>=2) {
        const url = data.url;
        if (url) {
          if (url.startsWith('http')) window.open(url,'_blank');
          else window.location.href = url;
        }
        state._satClicks[id] = 0;
      }
    }
  }

  // =========================================================
  // フェーズ遷移
  // =========================================================
  function enterPhase2() {
    const cEl = document.getElementById('node-center');
    cEl.style.transition = 'width 0.5s ease, height 0.5s ease, left 0.5s ease, top 0.5s ease';
    setNodeStyle(cEl, cx(), cy(), centerSize(true));

    setTimeout(() => {
      cEl.style.transition = '';
      state.phase            = 'expanded';
      state.centerNodeId     = 'node-center';
      state.satelliteNodeIds = ['node-2','node-3','node-4'];
      state.centerClickCount = 0;
      state._satClicks       = {};

      // node-2,3,4 を表示
      ['node-2','node-3','node-4'].forEach((id,i) => {
        const el = document.getElementById(id);
        if (!el) return;
        setTimeout(() => {
          el.classList.add('visible');
          el.style.pointerEvents = 'auto';
        }, 150 + i*120);
      });
      // node-5,6は非表示のまま
      const n5 = document.getElementById('node-5');
      if (n5) { n5.classList.remove('visible'); n5.style.pointerEvents='none'; }
      const n6 = document.getElementById('node-6');
      if (n6) { n6.classList.remove('visible'); n6.style.pointerEvents='none'; }

      document.getElementById('vector-overlay').classList.add('visible');
      startRipples(['node-center','node-2','node-3','node-4']);
      bindClicks();
    }, 500);
  }

  function enterPhase3() {
    state.phase        = 'project';
    state.innerNodeIds = ['node-center','node-5','node-6'];
    state.outerNodeIds = ['node-2','node-3','node-4'];
    state._satClicks   = {};

    // node-centerを通常表示に戻す（emptyクラスを外す）
    const cEl = document.getElementById('node-center');
    cEl.classList.remove('empty');
    cEl.style.opacity       = '1';
    cEl.style.pointerEvents = 'auto';
    cEl.style.zIndex        = '6';

    // node-5を表示
    const n5 = document.getElementById('node-5');
    if (n5) {
      n5.classList.add('visible');
      n5.style.pointerEvents = 'auto';
      n5.style.zIndex        = '6';
    }

    // node-6を表示
    const n6 = document.getElementById('node-6');
    if (n6) {
      n6.classList.add('visible');
      n6.style.pointerEvents = 'auto';
      n6.style.zIndex        = '6';
    }

    // node-2,3,4はそのまま（位置はアニメーションループが制御）
    startRipples(['node-center','node-5','node-2','node-3','node-4']);
    bindClicks();
  }

  // =========================================================
  // 初期化
  // =========================================================
  // 全ノードにbackground-imageをセット
  ALL_NODE_IDS.forEach(id => {
    const key = id==='node-center' ? 'center' : id.replace('node-','');
    setNodeBg(id, NODE_DATA[id].img);
  });

  resizeCanvas();
  drawRipples();

  const initEl = document.getElementById('node-center');
  setNodeStyle(initEl, cx(), cy(), centerSize(false));
  state.latestPositions['node-center'] = { x:cx(), y:cy(), r:centerSize(false)/2 };

  canvas.classList.add('visible');
  scheduleRipple('node-center');

  bindClicks();
  requestAnimationFrame(animLoop);

  window.addEventListener('resize', () => {
    resizeCanvas();
    const expanded = state.phase!=='init';
    if (state.phase==='init') {
      setNodeStyle(document.getElementById('node-center'), cx(), cy(), centerSize(false));
    }
  });
</script>
</body>
</html>
