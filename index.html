<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>?→</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8f8f6;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* 中央Image1 */
    #node-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      height: 80vw;
      max-width: 80vh;
      max-height: 80vh;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
      animation: pulse 3s ease-in-out infinite;
      transition: width 0.6s ease, height 0.6s ease, max-width 0.6s ease, max-height 0.6s ease;
    }

    #node-center.expanded {
      width: 32vw;
      height: 32vw;
      max-width: 32vh;
      max-height: 32vh;
    }

    #node-center img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(100,100,100,0.15); }
      50% { box-shadow: 0 0 0 16px rgba(100,100,100,0); }
    }

    /* Trinity nodes - JavaScriptで位置を制御 */
    .trinity-node {
      position: absolute;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.5s ease;
      width: 22vw;
      height: 22vw;
      max-width: 22vh;
      max-height: 22vh;
    }

    .trinity-node img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      pointer-events: none;
    }

    .trinity-node.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* 軌道リング */
    .orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .orbit-ring.visible {
      opacity: 0.12;
    }
  </style>
</head>
<body>
<div class="stage" id="stage">

  <div class="orbit-ring" id="orbit">
    <svg width="600" height="600" viewBox="0 0 600 600">
      <circle cx="300" cy="300" r="220" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 10"/>
    </svg>
  </div>

  <div id="node-center" onclick="expandTrinity()">
    <img src="image1-qveca.png" alt="?→">
  </div>

  <div class="trinity-node" id="node-2" onclick="handleTrinityClick(2, 'https://www.threads.com/@yasuto_okamura')">
    <img src="image2-inside.png" alt="内向きの?→">
  </div>

  <div class="trinity-node" id="node-3" onclick="handleTrinityClick(3, 'https://www.instagram.com/yasuto_okamura')">
    <img src="image3-outside.png" alt="外向きの?→">
  </div>

  <div class="trinity-node" id="node-4" onclick="handleTrinityClick(4, null)">
    <img src="image4-infinity.png" alt="世界・宇宙・全て">
  </div>

</div>

<script>
  let trinityVisible = false;
  let rotationAngle = 0;
  let animFrame;
  const clickCount = { 2: 0, 3: 0, 4: 0 };

  // 三角形の基本角度（120度ずつ）
  const baseAngles = [270, 30, 150]; // 上、右下、左下
  const nodeIds = ['node-2', 'node-3', 'node-4'];

  function getRadius() {
    return Math.min(window.innerWidth, window.innerHeight) * 0.33;
  }

  function updateTrinityPositions(angle) {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const r = getRadius();

    nodeIds.forEach((id, i) => {
      const node = document.getElementById(id);
      const deg = (baseAngles[i] + angle) * Math.PI / 180;
      const x = cx + r * Math.cos(deg);
      const y = cy + r * Math.sin(deg);
      const size = node.offsetWidth;
      node.style.left = (x - size / 2) + 'px';
      node.style.top = (y - size / 2) + 'px';
    });
  }

  function animateRotation() {
    rotationAngle += 0.15; // ゆっくり回転
    updateTrinityPositions(rotationAngle);
    animFrame = requestAnimationFrame(animateRotation);
  }

  function expandTrinity() {
    if (trinityVisible) {
      window.open('https://x.com/eple61', '_blank');
      return;
    }

    trinityVisible = true;

    // Image1を縮小
    document.getElementById('node-center').classList.add('expanded');
    document.getElementById('orbit').classList.add('visible');

    // Trinity nodes を表示
    nodeIds.forEach((id, i) => {
      setTimeout(() => {
        const node = document.getElementById(id);
        updateTrinityPositions(rotationAngle);
        node.classList.add('visible');
      }, i * 200);
    });

    // 回転アニメーション開始
    animateRotation();
  }

  function handleTrinityClick(id, url) {
    clickCount[id]++;
    if (id === 2) {
      window.open(url, '_blank');
      clickCount[id] = 0;
    } else if (id === 3) {
      if (clickCount[id] >= 2) {
        window.open(url, '_blank');
        clickCount[id] = 0;
      }
    } else if (id === 4) {
      window.open('https://ja.wikipedia.org/wiki/Special:RandomPage', '_blank');
      clickCount[id] = 0;
    }
  }

  // リサイズ対応
  window.addEventListener('resize', () => {
    if (trinityVisible) updateTrinityPositions(rotationAngle);
  });
</script>
</body>
</html>
