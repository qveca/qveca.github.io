<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>?→</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8f8f6;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* ベクトルSVG：nodeより下のレイヤー */
    #vector-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #vector-overlay.visible { opacity: 1; }

    /* image1：最上位 */
    #node-center {
      position: absolute;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      z-index: 10;
      -webkit-tap-highlight-color: transparent;
      animation: pulse 3s ease-in-out infinite;
      transition: width 0.7s ease, height 0.7s ease, left 0.7s ease, top 0.7s ease;
    }

    #node-center img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(120,120,120,0.15); }
      50%       { box-shadow: 0 0 0 20px rgba(120,120,120,0); }
    }

    /* trinity nodes：SVGより上、image1より下 */
    .trinity-node {
      position: absolute;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      z-index: 6;
      opacity: 0;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.6s ease;
    }

    .trinity-node img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .trinity-node.visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
<div class="stage">

  <svg id="vector-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow-end" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="rgba(100,100,100,0.3)"/>
      </marker>
      <marker id="arrow-start" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
        <path d="M0,0 L0,6 L8,3 z" fill="rgba(100,100,100,0.3)"/>
      </marker>
    </defs>
  </svg>

  <div id="node-center" onclick="expandTrinity()">
    <img src="image1-qveca.png" alt="?→">
  </div>

  <div class="trinity-node" id="node-2" onclick="handleTrinityClick(2, 'https://www.threads.com/@yasuto_okamura')">
    <img src="image2-inside.png" alt="内向きの?→">
  </div>

  <div class="trinity-node" id="node-3" onclick="handleTrinityClick(3, 'https://www.instagram.com/yasuto_okamura')">
    <img src="image3-outside.png" alt="外向きの?→">
  </div>

  <div class="trinity-node" id="node-4" onclick="handleTrinityClick(4, null)">
    <img src="image4-infinity.png" alt="世界・宇宙・全て">
  </div>

</div>

<script>
  let trinityVisible = false;
  let rotationAngle = 0;
  let animFrame;
  const clickCount = { 2: 0, 3: 0, 4: 0 };
  const baseAngles = [270, 30, 150];
  const nodeIds = ['node-2', 'node-3', 'node-4'];

  const wobble = [
    { phase: 0,   speed: 0.012, amp: 6 },
    { phase: 2.1, speed: 0.009, amp: 8 },
    { phase: 4.3, speed: 0.011, amp: 5 },
  ];
  let wobbleT = 0;

  function vw() { return window.innerWidth; }
  function vh() { return window.innerHeight; }
  function centerX() { return vw() / 2; }
  function centerY() { return vh() / 2; }
  function nodeSize() { return Math.min(vw(), vh()) * 0.22; }
  function orbitRadius() { return Math.min(vw(), vh()) * 0.34; }

  function setNodeCenter(expanded) {
    const el = document.getElementById('node-center');
    const size = expanded
      ? Math.min(vw(), vh()) * 0.28
      : Math.min(vw(), vh()) * 0.78;
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.left   = (centerX() - size / 2) + 'px';
    el.style.top    = (centerY() - size / 2) + 'px';
  }

  // nodeの中心座標を返す
  function getNodeCenter(el) {
    const l = parseFloat(el.style.left);
    const t = parseFloat(el.style.top);
    const w = parseFloat(el.style.width);
    const h = parseFloat(el.style.height);
    return { x: l + w / 2, y: t + h / 2, r: w / 2 };
  }

  // 2点間のベクトルをnodeの縁からnodeの縁へ、制御点付き弧で描く
  function makeArcPath(from, to, cp) {
    // from縁からの出発点
    const fdx = cp.x - from.x;
    const fdy = cp.y - from.y;
    const fl = Math.sqrt(fdx*fdx + fdy*fdy) || 1;
    const sx = from.x + (fdx/fl) * from.r;
    const sy = from.y + (fdy/fl) * from.r;

    // to縁への到着点
    const tdx = cp.x - to.x;
    const tdy = cp.y - to.y;
    const tl = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
    const ex = to.x + (tdx/tl) * to.r;
    const ey = to.y + (tdy/tl) * to.r;

    return `M ${sx} ${sy} Q ${cp.x} ${cp.y} ${ex} ${ey}`;
  }

  function drawVectors(cx, cy, positions) {
    const svg = document.getElementById('vector-overlay');
    // defsを保持して他を削除
    const defs = svg.querySelector('defs');
    svg.innerHTML = '';
    svg.appendChild(defs);

    const c1r = parseFloat(document.getElementById('node-center').style.width) / 2;
    const center = { x: cx, y: cy, r: c1r };

    // Trinity間のベクトル（三角形の辺）
    for (let i = 0; i < positions.length; i++) {
      const from = positions[i];
      const to   = positions[(i + 1) % positions.length];
      // 制御点：中点をわずかに中心側へ
      const mx = (from.x + to.x) / 2;
      const my = (from.y + to.y) / 2;
      const cp = {
        x: mx + (cx - mx) * 0.18,
        y: my + (cy - my) * 0.18,
      };
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', makeArcPath(from, to, cp));
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'rgba(100,100,100,0.22)');
      path.setAttribute('stroke-width', '1');
      path.setAttribute('marker-start', 'url(#arrow-start)');
      path.setAttribute('marker-end', 'url(#arrow-end)');
      svg.appendChild(path);
    }

    // 中心 ↔ 各Trinity（放射ベクトル）
    positions.forEach(pos => {
      const angle = Math.atan2(pos.y - cy, pos.x - cx);
      const cp = {
        x: cx + (pos.x - cx) * 0.45 + Math.cos(angle + Math.PI/2) * 20,
        y: cy + (pos.y - cy) * 0.45 + Math.sin(angle + Math.PI/2) * 20,
      };
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', makeArcPath(center, pos, cp));
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'rgba(100,100,100,0.18)');
      path.setAttribute('stroke-width', '0.8');
      path.setAttribute('marker-start', 'url(#arrow-start)');
      path.setAttribute('marker-end', 'url(#arrow-end)');
      svg.appendChild(path);
    });
  }

  function updateTrinityPositions() {
    wobbleT++;
    const r   = orbitRadius();
    const size = nodeSize();
    const cx  = centerX();
    const cy  = centerY();
    const positions = [];

    nodeIds.forEach((id, i) => {
      const node = document.getElementById(id);
      const deg = (baseAngles[i] + rotationAngle) * Math.PI / 180;
      const wx = Math.sin(wobbleT * wobble[i].speed + wobble[i].phase) * wobble[i].amp;
      const wy = Math.cos(wobbleT * wobble[i].speed * 1.3 + wobble[i].phase) * wobble[i].amp * 0.6;
      const x = cx + r * Math.cos(deg) + wx;
      const y = cy + r * Math.sin(deg) + wy;
      node.style.width  = size + 'px';
      node.style.height = size + 'px';
      node.style.left   = (x - size / 2) + 'px';
      node.style.top    = (y - size / 2) + 'px';
      positions.push({ x, y, r: size / 2 });
    });

    drawVectors(cx, cy, positions);
  }

  function animate() {
    rotationAngle += 0.12;
    updateTrinityPositions();
    animFrame = requestAnimationFrame(animate);
  }

  function expandTrinity() {
    if (trinityVisible) {
      window.open('https://x.com/eple61', '_blank');
      return;
    }
    trinityVisible = true;
    setNodeCenter(true);

    updateTrinityPositions();
    nodeIds.forEach((id, i) => {
      setTimeout(() => {
        document.getElementById(id).classList.add('visible');
      }, i * 180);
    });
    setTimeout(() => {
      document.getElementById('vector-overlay').classList.add('visible');
    }, 600);

    animate();
  }

  function handleTrinityClick(id, url) {
    clickCount[id]++;
    if (id === 2) {
      window.open(url, '_blank');
      clickCount[id] = 0;
    } else if (id === 3) {
      if (clickCount[id] >= 2) { window.open(url, '_blank'); clickCount[id] = 0; }
    } else if (id === 4) {
      window.open('https://ja.wikipedia.org/wiki/Special:RandomPage', '_blank');
      clickCount[id] = 0;
    }
  }

  setNodeCenter(false);
  window.addEventListener('resize', () => {
    setNodeCenter(trinityVisible);
    if (trinityVisible) updateTrinityPositions();
  });
</script>
</body>
</html>
