<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>?→</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8f8f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vmin;
      height: 100vmin;
      max-width: 600px;
      max-height: 600px;
    }

    /* 中央：Image1 */
    .node {
      position: absolute;
      cursor: pointer;
      border-radius: 50%;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .node img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .node:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0,0,0,0.15);
    }

    /* 螺旋・揺らぎのアニメーション */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      33% { transform: translateY(-8px) rotate(1deg); }
      66% { transform: translateY(4px) rotate(-1deg); }
    }

    @keyframes floatAlt {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      33% { transform: translateY(6px) rotate(-1deg); }
      66% { transform: translateY(-10px) rotate(1deg); }
    }

    @keyframes spiral-in {
      0% { opacity: 0; transform: scale(0) rotate(-180deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(100,100,100,0.2); }
      50% { box-shadow: 0 0 0 12px rgba(100,100,100,0); }
    }

    #node-center {
      width: 38%;
      height: 38%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 3s ease-in-out infinite, float 7s ease-in-out infinite;
      z-index: 10;
    }

    #node-center:hover {
      animation: pulse 3s ease-in-out infinite;
      transform: translate(-50%, -50%) scale(1.05);
    }

    /* Trinity nodes */
    .trinity-node {
      width: 26%;
      height: 26%;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    .trinity-node.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* 三角形の配置：上、左下、右下 */
    #node-2 {
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      animation: floatAlt 8s ease-in-out infinite;
    }

    #node-3 {
      bottom: 8%;
      left: 12%;
      animation: float 9s ease-in-out infinite;
    }

    #node-4 {
      bottom: 8%;
      right: 12%;
      animation: floatAlt 6s ease-in-out infinite;
    }

    .trinity-node.visible {
      animation-play-state: running;
    }

    /* サブリンクの表示 */
    .sub-links {
      display: none;
      position: absolute;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #333;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      z-index: 20;
      line-height: 1.8;
    }

    .sub-links a {
      display: block;
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }

    .sub-links a:hover {
      color: #000;
    }

    /* 回転する円のSVGライン */
    .orbit-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .orbit-ring.visible {
      opacity: 0.15;
    }

    @keyframes rotate-slow {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .orbit-ring svg {
      animation: rotate-slow 20s linear infinite;
    }

    /* ヒントテキスト */
    .hint {
      position: absolute;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.1em;
      opacity: 1;
      transition: opacity 0.5s ease;
      white-space: nowrap;
    }

    .hint.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="stage">

  <!-- 軌道リング -->
  <div class="orbit-ring" id="orbit">
    <svg width="500" height="500" viewBox="0 0 500 500">
      <circle cx="250" cy="250" r="180" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="4 8"/>
      <circle cx="250" cy="250" r="140" fill="none" stroke="#888" stroke-width="0.3" stroke-dasharray="2 12"/>
    </svg>
  </div>

  <!-- 中央：Image1 (?→そのもの) -->
  <div class="node" id="node-center" onclick="expandTrinity()">
    <img src="image1-qveca.png" alt="?→">
  </div>

  <!-- Trinity: Image2 (内向き) -->
  <div class="node trinity-node" id="node-2" onclick="handleTrinityClick(2, 'https://www.threads.com/@yasuto_okamura')">
    <img src="image2-inside.png" alt="内向きの?→">
  </div>

  <!-- Trinity: Image3 (外向き) -->
  <div class="node trinity-node" id="node-3" onclick="handleTrinityClick(3, 'https://www.instagram.com/yasuto_okamura')">
    <img src="image3-outside.png" alt="外向きの?→">
  </div>

  <!-- Trinity: Image4 (世界・宇宙) -->
  <div class="node trinity-node" id="node-4" onclick="handleTrinityClick(4, null)">
    <img src="image4-infinity.png" alt="世界・宇宙・全て">
  </div>

  <p class="hint" id="hint">?→</p>

</div>

<script>
  let trinityVisible = false;
  const clickCount = { 2: 0, 3: 0, 4: 0 };

  function expandTrinity() {
    if (trinityVisible) {
      // 2回目クリックでXへ
      window.open('https://x.com/eple61', '_blank');
      return;
    }

    trinityVisible = true;

    const nodes = document.querySelectorAll('.trinity-node');
    const orbit = document.getElementById('orbit');
    const hint = document.getElementById('hint');

    orbit.classList.add('visible');
    hint.classList.add('hidden');

    nodes.forEach((node, i) => {
      setTimeout(() => {
        node.style.animation = 'spiral-in 0.6s ease forwards';
        setTimeout(() => {
          node.classList.add('visible');
          node.style.animation = '';
        }, 600);
      }, i * 200);
    });
  }

  function handleTrinityClick(id, url) {
    clickCount[id]++;

    if (id === 2) {
      // Image2：1回目で直接Threadsへ
      window.open(url, '_blank');
      clickCount[id] = 0;
    } else if (id === 3) {
      if (clickCount[id] >= 2) {
        window.open(url, '_blank');
        clickCount[id] = 0;
      }
    } else if (id === 4) {
      // ランダム観測：Wikipediaランダムへ
      window.open('https://ja.wikipedia.org/wiki/Special:RandomPage', '_blank');
      clickCount[id] = 0;
    }
  }
</script>

</body>
</html>
